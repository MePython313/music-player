<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HyperPlayer X</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <button id="openBtn" aria-label="Open music folder">📂 Library</button>
  <input id="search" placeholder="Search songs..." aria-label="Search songs">
  <button id="themeBtn" aria-label="Toggle theme">🎨 Theme</button>
</header>

<div id="main">

  <aside id="sidebar">
    <div id="stats">
      <div class="card">🎵 Songs<br><b id="totalFiles">0</b></div>
      <div class="card">💾 Size<br><b id="totalSize">0 MB</b></div>
      <div class="card">🔢 Track<br><b id="songNum">-</b></div>
      <div class="card">📦 File<br><b id="songSize">-</b></div>
    </div>
    <div id="songs" role="listbox" aria-label="Song list"></div>
  </aside>

  <main id="content">

    <div id="hero">
      <div>
        <h1 id="title">HyperPlayer X</h1>
        <div id="subtitle">Load a music folder</div>
      </div>
      <div id="cover"></div>
    </div>

    <canvas id="visualizer" aria-label="Audio visualizer"></canvas>

    <div id="controls">
      <button id="prev" aria-label="Previous track">⏮</button>
      <button id="play" aria-label="Play/Pause">▶</button>
      <button id="next" aria-label="Next track">⏭</button>
      <button id="shuffle" aria-label="Random track">🔀</button>
      <button id="sortBtn" aria-label="Sort songs">⇅ <span id="sortLabel">Name</span></button>
    </div>

    <div id="seekContainer">
      <span id="currentTime">0:00</span>
      <div id="progressBar" role="slider" aria-label="Seek" tabindex="0">
        <div id="progressFill"></div>
        <div id="progressThumb"></div>
      </div>
      <span id="totalTime">0:00</span>
    </div>

    <div id="volumeContainer">
      <button id="muteBtn" aria-label="Mute/Unmute">🔊</button>
      <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.7" aria-label="Volume">
      <div id="visualizerMode" role="button" tabindex="0" aria-label="Toggle visualizer mode">Wave</div>
    </div>

    <div id="stars" aria-label="Rating">
      <span data-v="1" aria-label="Rate 1 star">★</span>
      <span data-v="2" aria-label="Rate 2 stars">★</span>
      <span data-v="3" aria-label="Rate 3 stars">★</span>
      <span data-v="4" aria-label="Rate 4 stars">★</span>
      <span data-v="5" aria-label="Rate 5 stars">★</span>
    </div>

    <audio id="audio" preload="auto"></audio>
  </main>
</div>

<input hidden id="picker" type="file" webkitdirectory multiple accept="audio/*">

<div id="toast-container"></div>

<script src="js/storage.js"></script>
<script src="js/visualizer.js"></script>
<script src="js/player.js"></script>
<script src="js/app.js"></script>
</body>
</html>
